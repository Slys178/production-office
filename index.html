<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Office – Staircraft</title>
<style>
  @import url('https://script.google.com/macros/s/AKfycbySSKSp6tvCdxxHQ0HscEgALFkIimWn1lVW06Ojod0BAE22l_DfSpz8UB8As0IpCFspmQ/exec');

  :root {
    --bg:        #0f1117;
    --surface:   #181c25;
    --card:      #1e2330;
    --border:    #2a2f3d;
    --accent:    #f0a500;
    --accent2:   #e05c2a;
    --green:     #2ecc71;
    --amber:     #f39c12;
    --red:       #e74c3c;
    --text:      #e8eaf0;
    --muted:     #7a8094;
    --mono:      'DM Mono', monospace;
    --sans:      'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--text);
    text-transform: uppercase;
  }

  .logo-mark {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 500; font-size: 14px; color: #000;
  }

  .logo-sep { color: var(--border); margin: 0 4px; }
  .logo-sub { color: var(--muted); }

  nav { display: flex; gap: 4px; }

  nav button {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  nav button:hover { background: var(--card); color: var(--text); }
  nav button.active { background: var(--accent); color: #000; }

  .week-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  main { padding: 24px; max-width: 1100px; margin: 0 auto; }

  .view { display: none; }
  .view.active { display: block; }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .prediction-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  @media (max-width: 700px) { .prediction-grid { grid-template-columns: 1fr; } }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 500;
    line-height: 1;
    color: var(--text);
  }

  .stat-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  .status-banner {
    border-radius: 10px;
    padding: 18px 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border: 1px solid transparent;
  }

  .status-banner.green { background: rgba(46,204,113,0.1);  border-color: rgba(46,204,113,0.3); }
  .status-banner.amber { background: rgba(243,156,18,0.1);  border-color: rgba(243,156,18,0.3); }
  .status-banner.red   { background: rgba(231,76,60,0.1);   border-color: rgba(231,76,60,0.3);  }

  .status-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;

  .green .status-dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .amber .status-dot { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .red   .status-dot { background: var(--red);   box-shadow: 0 0 8px var(--red);   }

  .status-text { font-size: 15px; font-weight: 500; }
  .status-sub  { font-size: 12px; color: var(--muted); margin-top: 3px; }

  .cap-bar-wrap { margin-bottom: 20px; }
  .cap-bar-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; color: var(--muted); }
  .cap-bar-track { height: 10px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .cap-bar-fill  { height: 100%; border-radius: 99px; transition: width 0.6s ease; }

  .team-table { width: 100%; border-collapse: collapse; }
  .team-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .team-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .team-table tr:last-child td { border-bottom: none; }

  .initials-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px; height: 28px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--accent);

  .day-cells { display: flex; gap: 4px; }
  .day-cell {
    width: 32px; height: 24px;
    border-radius: 4px;
    font-size: 10px;
    font-family: var(--mono);
    display: flex; align-items: center; justify-content: center;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);

  .day-cell.off    { background: rgba(231,76,60,0.15);   color: var(--red);    border-color: rgba(231,76,60,0.3);  }
  .day-cell.half   { background: rgba(243,156,18,0.15);  color: var(--amber);  border-color: rgba(243,156,18,0.3); }
  .day-cell.carry  { background: rgba(240,165,0,0.1);    color: var(--accent); border-color: rgba(240,165,0,0.3);  }
  .day-cell.bank   { background: rgba(100,100,180,0.15); color: #9b9fe8;       border-color: rgba(100,100,180,0.3);}
  .day-cell.second { background: rgba(100,180,100,0.15); color: #7ecf7e;       border-color: rgba(100,180,100,0.3);}

  .week-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }

  .week-nav button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    font-size: 18px;
    width: 32px; height: 32px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;

  .week-nav button:hover { border-color: var(--accent); color: var(--accent); }

  .week-display {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 14px;

  .prog-week-note {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;

  .loading { text-align: center; color: var(--muted); font-size: 13px; padding: 40px; font-family: var(--mono); }
  .empty   { text-align: center; color: var(--muted); font-size: 13px; padding: 30px; }

  #toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 999;
  }
  #toast.show    { opacity: 1; }
  #toast.success { border-color: rgba(46,204,113,0.4); }
  #toast.error   { border-color: rgba(231,76,60,0.4);  }

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const API_KEY        = 'AIzaSyC7LqaHIyCp7qcHSbrC8EjufPD_qGiZD-M';
const SHEET_ID       = '1NYHtbL_-mepijGGXT7LRetqhEttLyaMYzOcKHzPzvB8';
const PLANNER_SHEET  = '2026'; // Reading from the 2026 sheet
const SCRIPT_URL     = 'https://script.google.com/macros/s/AKfycbySSKSp6tvCdxxHQ0HscEgALFkIimWn1lVW06Ojod0BAE22l_DfSpz8UB8As0IpCFspmQ/exec';

// Team capacity
const TEAM = {
  SF: { name: 'Simon Faulks',         fullDay: 50, friday: 34 },
  LA: { name: 'Liam Aiello',          fullDay: 37, friday: 21 },
  DF: { name: 'Dominika Formanowicz', fullDay: 34, friday: 18 },
  AS: { name: 'Adam Stanislawski',    fullDay: 50, friday: 34 },
};

const HOLIDAY_NAMES = {
  SF: 'Faulks',
  LA: 'Aiello',
  DF: 'Formanowicz',
  AS: 'Stanislawski',
};

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let currentWeekStart = getMonday(new Date());
let loadsWeekStart   = getMonday(new Date());
let logWeekStart     = getMonday(new Date());
let allLoads         = [];
let holidayData      = {};
let holidayLoaded    = false;

// ═══════════════════════════════════════════
//  DATE HELPERS
// ═══════════════════════════════════════════
function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  dt.setHours(0,0,0,0);
  return dt;
}

function addDays(d, n) {
  const dt = new Date(d);
  dt.setDate(dt.getDate() + n);
  return dt;
}

function fmtDate(d) {
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

function fmtWeekRange(mon) {
  const fri = addDays(mon, 4);
  return `w/c ${fmtDate(mon)}`;
}

function fmtHolKey(d) {
  const day   = d.getDate();
  const month = d.getMonth() + 1;
  const year  = String(d.getFullYear()).slice(2);
  return `${day}/${month}/${year}`;
}

function parseSheetDate(s) {
  if (!s) return null;
  
  // Try different date formats
  // Format 1: dd/mm/yyyy or d/m/yyyy
  if (s.includes('/')) {
    const parts = s.trim().split('/');
    if (parts.length === 3) {
      let [d, m, y] = parts.map(Number);
      if (y < 100) y += 2000;
      return new Date(y, m - 1, d);
    }
  }
  
  // Format 2: yyyy-mm-dd (ISO)
  if (s.includes('-') && s.length === 10) {
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d);
  }
  
  // Format 3: Try direct Date parsing
  const d = new Date(s);
  if (!isNaN(d.getTime())) {
    return d;
  }
  
  return null;
}

function isoDate(d) {
  return d.toISOString().split('T')[0];
}

function weekDays(mon) {
  return [0,1,2,3,4].map(i => addDays(mon, i));
}

// ═══════════════════════════════════════════
//  SHEETS READ API
// ═══════════════════════════════════════════
async function sheetsGet(range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?key=${API_KEY}`;
  console.log('📡 Fetching:', url);
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Sheets API error: ${r.status}`);
  const data = await r.json();
  return data.values || [];
}

// ═══════════════════════════════════════════
//  APPS SCRIPT WRITE
// ═══════════════════════════════════════════
async function scriptPost(payload) {
  const r = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  });
  if (!r.ok) throw new Error('Script POST failed');
  return r.json();
}

// ═══════════════════════════════════════════
//  LOAD HOLIDAY DATA
// ═══════════════════════════════════════════
async function loadHolidays() {
  if (holidayLoaded) return;
  try {
    const rows = await sheetsGet('2026!A1:ZZ20');
    console.log('📊 Holiday rows:', rows ? rows.length : 0);

    let dateRow = null, dateRowIdx = -1;
    for (let i = 0; i < rows.length; i++) {
      if (rows[i] && rows[i][3] && /^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(String(rows[i][3]).trim())) {
        dateRow = rows[i];
        dateRowIdx = i;
        break;
      }
    }

    if (!dateRow) { console.warn('⚠️ Holiday date row not found'); return; }

    const dateMap = {};
    for (let c = 3; c < dateRow.length; c++) {
      const raw = String(dateRow[c] || '').trim();
      if (raw) dateMap[raw] = c;
    }

    for (const [init, surname] of Object.entries(HOLIDAY_NAMES)) {
      holidayData[init] = {};
      for (let i = dateRowIdx + 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row) continue;
        const name = String(row[0] || '').trim().toLowerCase();
        if (name.includes(surname.toLowerCase())) {
          for (const [dateStr, colIdx] of Object.entries(dateMap)) {
            const val = String(row[colIdx] || '').trim();
            if (val) holidayData[init][dateStr] = val;
          }
          break;
        }
      }
    }
    holidayLoaded = true;
    console.log('✅ Holiday data loaded');
  } catch(e) {
    console.error('❌ Holiday load failed:', e);
  }
}

// ═══════════════════════════════════════════
//  DAY STATUS FOR A PERSON
// ═══════════════════════════════════════════
function getDayStatus(init, date) {
  const key = fmtHolKey(date);
  const val = (holidayData[init] || {})[key] || '';
  if (!val)                               return 'full';
  if (val === 'H' || val === 'O')         return 'off';
  if (val === 'B')                        return 'bank';
  if (val === 'C')                        return 'carrier';
  if (val === '2nd')                      return '2nd';
  if (val === 'h/am' || val === 'h/pm' || val === 'h') return 'half';
  return 'full';
}

// ═══════════════════════════════════════════
//  CAPACITY CALCULATION
// ═══════════════════════════════════════════
function calcCapacity(programmingWeek) {
  const days = weekDays(programmingWeek);
  let total = 0;
  const perPerson = {};

  for (const [init, cfg] of Object.entries(TEAM)) {
    let personTotal = 0;
    const dayBreakdown = [];

    days.forEach((d, idx) => {
      const isFriday = idx === 4;
      const base     = isFriday ? cfg.friday : cfg.fullDay;
      const status   = getDayStatus(init, d);
      let stairs     = 0;

      if (status === 'off' || status === 'bank' || status === '2nd') {
        stairs = 0;
      } else if (status === 'half') {
        stairs = Math.round(base * 0.5);
      } else {
        stairs = base;
      }

      personTotal += stairs;
      dayBreakdown.push({ date: d, status, stairs, base });
    });

    perPerson[init] = { total: personTotal, days: dayBreakdown };
    total += personTotal;
  }

  return { total, perPerson };
}

// ═══════════════════════════════════════════
//  LOAD DATA FROM SHEET - FIXED VERSION
// ═══════════════════════════════════════════
async function loadAllLoads() {
  try {
    // Try reading ALL columns from 2026 sheet
    console.log('🔍 Reading from: 2026!A1:Z1000');
    const rows = await sheetsGet('2026!A1:Z1000');
    console.log('📊 Found', rows ? rows.length : 0, 'rows in total');
    
    if (!rows || rows.length < 2) { 
      console.warn('⚠️ No data found in 2026 sheet');
      allLoads = []; 
      return; 
    }

    // Debug: Show first few rows
    console.log('📋 First 3 rows:', rows.slice(0, 3));

    // Try to find the header row
    let headerRow = rows[0];
    let loadCol = -1, stairsCol = -1, dateCol = -1;
    
    // Look for columns by header name
    for (let i = 0; i < headerRow.length; i++) {
      const header = String(headerRow[i] || '').toLowerCase().trim();
      if (header.includes('load') || header.includes('job') || header.includes('number')) {
        loadCol = i;

      }
      if (header.includes('stair') || header.includes('part') || header.includes('qty')) {
        stairsCol = i;
        console.log('✅ Found stairs column at index', i, ':', header);
      }
      if (header.includes('delivery') || header.includes('date') || header.includes('due')) {
        dateCol = i;
        console.log('✅ Found date column at index', i, ':', header);

    }

    // If we didn't find headers, assume columns: A=Load, B=Stairs, C=Date
    if (loadCol === -1) loadCol = 0;
    if (stairsCol === -1) stairsCol = 1;
    if (dateCol === -1) dateCol = 2;

    console.log('📋 Using columns - Load:', loadCol, 'Stairs:', stairsCol, 'Date:', dateCol);

    allLoads = rows.slice(1)
      .filter(r => r && r[loadCol] && r[loadCol].toString().trim() !== '')
      .map((r, i) => ({
        rowNum:       i + 2,
        loadNum:      r[loadCol] ? r[loadCol].toString().trim() : '',
        stairs:       parseInt(r[stairsCol]) || 0,
        deliveryDate: r[dateCol] ? r[dateCol].toString().trim() : '',
        addedDate:    '',
        assignedTo:   '',
        startTime:    '',
        loggedDate:   '',
        lateFlag:     '',
      }));

    console.log('✅ Loaded', allLoads.length, 'loads from 2026 sheet');
    console.log('📋 First load:', allLoads[0]);

  } catch(e) {
    console.error('❌ Load read failed:', e);
    allLoads = [];
  }
}

function getLoadsForWeek(weekMon) {
  const monStr = isoDate(weekMon);
  const friStr = isoDate(addDays(weekMon, 4));
  console.log('📅 Filtering loads for week:', monStr, 'to', friStr);
  
  const filtered = allLoads.filter(l => {
    const d = parseSheetDate(l.deliveryDate);
    if (!d) {
      console.log('⚠️ Could not parse date:', l.deliveryDate);
      return false;
    }
    const ds = isoDate(d);
    const match = ds >= monStr && ds <= friStr;
    if (match) {
      console.log('✅ Match found:', l.loadNum, 'on', l.deliveryDate);
    }
    return match;
  });
  
  console.log('📊 Found', filtered.length, 'loads for this week');
  return filtered;
}

// ═══════════════════════════════════════════
//  RENDER PREDICTION
// ═══════════════════════════════════════════
async function renderPrediction() {
  const deliveryWeek     = currentWeekStart;
  const programmingWeek  = addDays(deliveryWeek, -7);

  document.getElementById('week-label').textContent =
    `Delivery ${fmtWeekRange(deliveryWeek)}`;
  document.getElementById('prog-week-note').textContent =
    `Programming ${fmtWeekRange(programmingWeek)}`;
  document.getElementById('breakdown-week').textContent =
    `Programming week — ${fmtWeekRange(programmingWeek)}`;

  await loadHolidays();
  await loadAllLoads();

  const { total: capacity, perPerson } = calcCapacity(programmingWeek);
  const loads = getLoadsForWeek(deliveryWeek);
  const totalStairs = loads.reduce((s, l) => s + l.stairs, 0);
  const surplus     = capacity - totalStairs;
  const pct         = capacity > 0 ? Math.min(100, Math.round((totalStairs / capacity) * 100)) : 0;

  // Status banner
  let statusClass, statusMsg, statusSub;
  if (totalStairs === 0) {
    statusClass = 'amber';
    statusMsg   = 'No loads found for this delivery week';
    statusSub   = 'Check that loads have delivery dates in this week.';
  } else if (surplus >= 50) {
    statusClass = 'green';
    statusMsg   = `On track — ${surplus} stairs of headroom`;
    statusSub   = `Team can complete all ${loads.length} load${loads.length !== 1 ? 's' : ''} with capacity to spare.`;
  } else if (surplus >= 0) {
    statusClass = 'amber';
    statusMsg   = `Tight — only ${surplus} stairs of headroom`;
    statusSub   = 'Any absence or late addition could push this week over capacity.';
  } else {
    statusClass = 'red';
    statusMsg   = `Over capacity by ${Math.abs(surplus)} stairs`;
    statusSub   = `${loads.length} load${loads.length !== 1 ? 's' : ''} exceed what the team can program this week.`;
  }

  document.getElementById('status-area').innerHTML = `
    <div class="status-banner ${statusClass}" style="margin-bottom:16px;">
      <div class="status-dot"></div>
      <div>
        <div class="status-text">${statusMsg}</div>
        <div class="status-sub">${statusSub}</div>
      </div>
    </div>`;

  document.getElementById('stat-cards').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Stairs to Deliver</div>
      <div class="stat-value">${totalStairs}</div>
      <div class="stat-sub">across ${loads.length} load${loads.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Programming Capacity</div>
      <div class="stat-value" style="color:${surplus < 0 ? 'var(--red)' : 'var(--green)'}">${capacity}</div>
      <div class="stat-sub">${surplus >= 0 ? surplus + ' stairs spare' : Math.abs(surplus) + ' stairs over'}</div>
    </div>`;

  const barColor = surplus < 0 ? 'var(--red)' : surplus < 50 ? 'var(--amber)' : 'var(--green)';
  document.getElementById('cap-bar-wrap').innerHTML = `
    <div class="cap-bar-label"><span>${totalStairs} stairs required</span><span>${pct}% of capacity</span></div>
    <div class="cap-bar-track">
      <div class="cap-bar-fill" style="width:${pct}%;background:${barColor};"></div>
    </div>
    <div class="cap-bar-label" style="margin-top:6px;"><span></span><span>${capacity} stairs available</span></div>`;

  // Team breakdown
  const days      = weekDays(programmingWeek);
  const dayLabels = ['Mon','Tue','Wed','Thu','Fri'];

  const tbRows = Object.entries(perPerson).map(([init, data]) => {
    const dayCells = data.days.map((d, i) => {
      const s = d.status;
      let cls = '', lbl = dayLabels[i];
      if      (s === 'off')     { cls = 'off';    lbl = 'OFF'; }
      else if (s === 'bank')    { cls = 'bank';   lbl = 'BH';  }
      else if (s === 'half')    { cls = 'half';   lbl = '½';   }
      else if (s === 'carrier') { cls = 'carry';  lbl = 'C';   }
      else if (s === '2nd')     { cls = 'second'; lbl = '2nd'; }
      return `<div class="day-cell ${cls}" title="${fmtDate(d.date)}: ${d.stairs} stairs">${lbl}</div>`;
    }).join('');

    return `<tr>
      <td><div class="initials-badge">${init}</div></td>
      <td style="font-size:12px;color:var(--muted);">${TEAM[init].name}</td>
      <td><div class="day-cells">${dayCells}</div></td>
      <td style="font-family:var(--mono);font-weight:500;">${data.total}</td>
    </tr>`;
  }).join('');

  document.getElementById('team-breakdown').innerHTML = `
    <table class="team-table">
      <thead><tr><th></th><th>Name</th><th>Days</th><th>Capacity</th></tr></thead>
      <tbody>${tbRows}</tbody>
    </table>`;
}

// ═══════════════════════════════════════════
//  RENDER LOADS (simplified)
// ═══════════════════════════════════════════
async function renderLoads() {
  document.getElementById('week-label-loads').textContent = fmtWeekRange(loadsWeekStart);
  await loadAllLoads();

  const loads = getLoadsForWeek(loadsWeekStart);
  const el    = document.getElementById('loads-list');

  if (!loads.length) {
    el.innerHTML = '<div class="empty">No loads found for this week. Check your 2026 sheet.</div>';
    return;
  }

  let html = `<table class="loads-table">
    <thead><tr>
      <th>Load No.</th><th>Stairs</th><th>Delivery Date</th>
    </tr></thead><tbody>`;

  loads.forEach(l => {
    html += `<tr>
      <td>${l.loadNum}</td>
      <td>${l.stairs}</td>
      <td>${l.deliveryDate}</td>
    </tr>`;
  });

  const totalStairs = loads.reduce((s, l) => s + l.stairs, 0);
  html += `</tbody><tfoot><tr>
    <td style="font-weight:600;color:var(--text);">Total</td>
    <td style="font-weight:600;color:var(--accent);">${totalStairs}</td>
    <td></td>
  </tr></tfoot></table>`;

  el.innerHTML = html;
}

// ═══════════════════════════════════════════
//  RENDER TEAM LOG (simplified)
// ═══════════════════════════════════════════
async function renderLog() {
  document.getElementById('week-label-log').textContent = fmtWeekRange(logWeekStart);
  await loadAllLoads();

  const loads = getLoadsForWeek(logWeekStart);
  const el    = document.getElementById('log-list');

  if (!loads.length) {
    el.innerHTML = '<div class="empty" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:30px;">No loads for this week.</div>';
    return;
  }

  el.innerHTML = loads.map(l => {
    return `<div class="log-card">
      <div>
        <div class="log-load-num">#${l.loadNum}</div>
        <div class="log-meta">${l.stairs} stairs · Due ${l.deliveryDate}</div>
      </div>
      <div style="color:var(--muted);">Not logged yet</div>
      <button class="btn-log" disabled>Log Start</button>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
function shiftWeek(n)      { currentWeekStart = addDays(currentWeekStart, n*7); renderPrediction(); }
function shiftWeekLoads(n) { loadsWeekStart   = addDays(loadsWeekStart,   n*7); renderLoads(); }
function shiftWeekLog(n)   { logWeekStart     = addDays(logWeekStart,     n*7); renderLog(); }

function shiftToCurrentWeek()      { currentWeekStart = getMonday(new Date()); renderPrediction(); }
function shiftToCurrentWeekLoads() { loadsWeekStart   = getMonday(new Date()); renderLoads(); }
function shiftToCurrentWeekLog()   { logWeekStart     = getMonday(new Date()); renderLog(); }

function showView(v, btn) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  if (btn) btn.classList.add('active');
  if (v === 'predict') renderPrediction();
  if (v === 'loads')   renderLoads();
  if (v === 'log')     renderLog();
}

// ═══════════════════════════════════════════
//  ADD LOAD (kept for manual entry if needed)
// ═══════════════════════════════════════════
async function addLoad() {
  const loadNum  = document.getElementById('inp-load-num').value.trim();
  const stairs   = parseInt(document.getElementById('inp-stairs').value);
  const delivery = document.getElementById('inp-delivery').value;

  if (!loadNum || !stairs || !delivery) {
    showToast('Please fill in all fields.', 'error'); return;
  }

  const dObj    = new Date(delivery + 'T00:00:00');
  const fmtDel  = `${String(dObj.getDate()).padStart(2,'0')}/${String(dObj.getMonth()+1).padStart(2,'0')}/${dObj.getFullYear()}`;
  const today = new Date().toLocaleDateString('en-GB');

  try {
    await scriptPost({
      action: 'append',
      sheet:  PLANNER_SHEET,
      row:    [loadNum, stairs, fmtDel, today, '', '']
    });
    showToast('Load added ✓', 'success');
    document.getElementById('inp-load-num').value = '';
    document.getElementById('inp-stairs').value   = '';
    document.getElementById('inp-delivery').value = '';
    await loadAllLoads();
    renderLoads();
    renderPrediction();
  } catch(e) {
    showToast('Could not save.', 'error');
    console.error(e);
  }
}

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => { t.className = ''; }, 3000);
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
document.getElementById('header-date').textContent =
  new Date().toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });

renderPrediction();
</script>
